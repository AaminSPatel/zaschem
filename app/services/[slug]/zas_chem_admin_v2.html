
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1d6ef5;--blue-light:#e8f0fe;--blue-mid:#2563eb;
  --orange:#f97316;--orange-light:#fff3e8;--orange-mid:#ea580c;
  --white:#ffffff;--black:#000000;
  --bg:#f5f6fa;--bg2:#ffffff;--bg3:#f0f2f8;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --border:#e2e8f0;--border2:#cbd5e1;
  --success:#16a34a;--success-bg:#f0fdf4;
  --danger:#dc2626;--danger-bg:#fef2f2;
  --warn:#d97706;--warn-bg:#fffbeb;
  --sidebar-w:220px;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

.shell{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform 0.25s}
.sb-brand{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo{width:34px;height:34px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;flex-shrink:0;letter-spacing:-0.5px}
.sb-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.3}
.sb-sub{font-size:10px;color:var(--orange);font-weight:600;letter-spacing:0.5px}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-nav::-webkit-scrollbar{width:0}
.sb-group{padding:12px 14px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3)}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-left:3px solid transparent;transition:all 0.15s;color:var(--text2)}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.active{background:var(--blue-light);border-left-color:var(--blue);color:var(--blue)}
.sb-item.active i{color:var(--blue)}
.sb-item i{font-size:17px;flex-shrink:0}
.sb-label{font-size:13px;font-weight:500}
.sb-badge{margin-left:auto;background:var(--orange);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.sb-badge.blue{background:var(--blue)}
.sb-footer{padding:12px;border-top:1px solid var(--border)}
.sb-user{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border-radius:8px}
.sb-avatar{width:30px;height:30px;border-radius:6px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.sb-uname{font-size:12px;font-weight:600;color:var(--text)}
.sb-uemail{font-size:10px;color:var(--text3);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{height:52px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.tb-menu{width:32px;height:32px;border:1px solid var(--border);border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:16px;background:none;flex-shrink:0}
.tb-menu:hover{background:var(--bg3)}
.tb-title{font-size:15px;font-weight:600;color:var(--text);flex:1}
.tb-search{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:6px 12px;font-size:13px;color:var(--text);outline:none;width:180px}
.tb-search:focus{border-color:var(--blue)}
.tb-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:16px;background:var(--white);flex-shrink:0}
.tb-btn:hover{background:var(--bg3)}
.content{flex:1;overflow-y:auto;padding:16px}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.ph{margin-bottom:16px}
.ph-title{font-size:18px;font-weight:700;color:var(--text)}
.ph-sub{font-size:13px;color:var(--text3);margin-top:2px}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px;border-top:3px solid var(--blue)}
.kpi.orange{border-top-color:var(--orange)}
.kpi.black{border-top-color:var(--black)}
.kpi-val{font-size:24px;font-weight:700;color:var(--text);line-height:1}
.kpi-lbl{font-size:12px;color:var(--text3);margin-top:4px}
.kpi-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:10px}
.kpi-icon.blue{background:var(--blue-light);color:var(--blue)}
.kpi-icon.orange{background:var(--orange-light);color:var(--orange)}
.kpi-icon.black{background:var(--bg3);color:var(--text)}

.card{background:var(--white);border:1px solid var(--border);border-radius:10px;margin-bottom:14px}
.card-hd{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.card-title{font-size:14px;font-weight:600;color:var(--text);flex:1}
.card-body{padding:16px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}

.bar-wrap{display:flex;align-items:flex-end;gap:6px;height:120px;padding:0 2px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.bar-fill{width:100%;border-radius:3px 3px 0 0;min-height:3px;background:var(--blue);transition:height 0.3s}
.bar-fill.orange{background:var(--orange)}
.bar-lbl{font-size:9px;color:var(--text3);text-align:center}

table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg3)}
th{padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;white-space:nowrap}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.tbl-wrap{overflow-x:auto}

.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-active{background:var(--success-bg);color:var(--success)}
.badge-inactive{background:var(--danger-bg);color:var(--danger)}
.badge-draft{background:var(--warn-bg);color:var(--warn)}
.badge-pending{background:var(--warn-bg);color:var(--warn)}
.badge-blue{background:var(--blue-light);color:#1d4ed8}
.badge-orange{background:var(--orange-light);color:#c2410c}
.badge-gray{background:var(--bg3);color:var(--text2)}
.stars{color:var(--orange);font-size:12px;letter-spacing:1px}

.toolbar{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
input.srch{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 11px;font-size:13px;color:var(--text);outline:none;min-width:160px;flex:1}
input.srch:focus{border-color:var(--blue)}
select.flt{background:var(--white);border:1px solid var(--border);border-radius:7px;padding:6px 10px;font-size:13px;color:var(--text2);outline:none;cursor:pointer}
.btn{padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:opacity 0.15s}
.btn:hover{opacity:0.85}
.btn-blue{background:var(--blue);color:#fff}
.btn-orange{background:var(--orange);color:#fff}
.btn-outline{background:var(--white);color:var(--text2);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid #fecaca}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn-icon{width:28px;height:28px;padding:0;justify-content:center;border-radius:6px}

.toggle{width:36px;height:20px;background:var(--border2);border-radius:10px;position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0;border:none;outline:none}
.toggle.on{background:var(--blue)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;background:#fff;border-radius:50%;transition:left 0.2s}
.toggle.on::after{left:19px}

.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px}
.form-input{width:100%;background:var(--white);border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-size:13px;color:var(--text);outline:none;transition:border-color 0.15s}
.form-input:focus{border-color:var(--blue)}
.form-input.ta{height:80px;resize:vertical}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.upload-box{border:2px dashed var(--border2);border-radius:10px;padding:28px;text-align:center;cursor:pointer;background:var(--bg3);transition:all 0.15s}
.upload-box:hover{border-color:var(--blue);background:var(--blue-light)}
.upload-icon{font-size:28px;color:var(--text3);margin-bottom:8px}
.upload-txt{font-size:13px;color:var(--text2);font-weight:500}
.upload-sub{font-size:11px;color:var(--text3);margin-top:3px}

.seo-preview{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:12px}
.seo-url{font-size:12px;color:var(--success);margin-bottom:2px}
.seo-ptitle{font-size:15px;color:#1a0dab;font-weight:500;margin-bottom:4px}
.seo-pdesc{font-size:12px;color:var(--text2);line-height:1.5}

.notif-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.notif-item:last-child{border-bottom:none}
.notif-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.notif-txt{font-size:13px;color:var(--text);line-height:1.5}
.notif-time{font-size:11px;color:var(--text3);margin-top:2px}
.notif-new-dot{width:7px;height:7px;background:var(--blue);border-radius:50%;flex-shrink:0;margin-top:4px}

.settings-tab-bar{display:flex;border-bottom:2px solid var(--border);margin-bottom:16px;overflow-x:auto}
.stab{padding:9px 16px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap}
.stab.active{color:var(--blue);border-bottom-color:var(--blue)}
.stab:hover{color:var(--text)}

.contact-item{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;display:flex;gap:12px;cursor:pointer;transition:border-color 0.15s}
.contact-item:hover{border-color:var(--blue)}
.contact-av{width:38px;height:38px;border-radius:8px;background:var(--blue-light);color:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}

.svc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.svc-card{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color 0.15s;cursor:pointer}
.svc-card:hover{border-color:var(--blue)}
.svc-img{height:70px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:28px}
.svc-body{padding:12px}
.svc-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.3}
.svc-slug{font-size:11px;color:var(--text3);margin-bottom:8px}
.svc-actions{display:flex;gap:6px;align-items:center}

.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.proj-card{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color 0.15s;cursor:pointer}
.proj-card:hover{border-color:var(--blue)}
.proj-img{height:64px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:26px;position:relative}
.proj-badge{position:absolute;top:6px;right:6px;background:var(--orange);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:4px}
.proj-body{padding:12px}
.proj-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.3}
.proj-meta{font-size:11px;color:var(--text3)}
.proj-tags{display:flex;gap:5px;flex-wrap:wrap;margin:7px 0 9px}

.test-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.test-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.test-av{width:38px;height:38px;border-radius:8px;background:var(--orange-light);color:var(--orange);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.test-review{font-size:13px;color:var(--text2);line-height:1.6;font-style:italic;padding:10px;background:var(--bg3);border-radius:7px;border-left:3px solid var(--blue);margin-bottom:10px}
.test-footer{display:flex;align-items:center;gap:8px}

.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding-top:60px}
.modal{background:var(--white);border-radius:12px;width:min(560px,94vw);max-height:80vh;overflow-y:auto;border:1px solid var(--border)}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.modal-title{font-size:15px;font-weight:600;flex:1}
.modal-body{padding:20px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

.overlay-back{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:199}
.sb-overlay{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:var(--white);z-index:300;border-right:1px solid var(--border);transform:translateX(-100%);transition:transform 0.25s;display:flex;flex-direction:column}
.sb-overlay.open{transform:translateX(0)}
.mob-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:299;display:none}
.mob-backdrop.show{display:block}

.inline-loading{display:flex;align-items:center;gap:8px;padding:20px;color:var(--text3);font-size:13px}
.spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{padding:14px 16px;background:var(--danger-bg);border:1px solid #fecaca;border-radius:8px;color:var(--danger);font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.success-box{padding:14px 16px;background:var(--success-bg);border:1px solid #bbf7d0;border-radius:8px;color:var(--success);font-size:13px;margin-bottom:12px}
.empty-state{padding:40px 20px;text-align:center;color:var(--text3)}
.empty-state i{font-size:32px;margin-bottom:8px;display:block}

.pager{display:flex;align-items:center;gap:6px;padding:10px 14px;border-top:1px solid var(--border);font-size:12px;color:var(--text3)}

@media(max-width:640px){
  .sidebar{display:none}
  .tb-search{display:none}
  .grid2{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .svc-grid{grid-template-columns:1fr 1fr}
  .proj-grid{grid-template-columns:1fr}
  .toolbar{gap:6px}
  .toolbar select{display:none}
  td:nth-child(n+4){display:none}
  th:nth-child(n+4){display:none}
}
</style>

<div id="modalRoot"></div>
<div id="toastRoot" style="position:fixed;bottom:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:6px"></div>

<script>
const API = 'http://localhost:5000/api';
let authToken = localStorage.getItem('zci_token') || null;
let authAdmin = JSON.parse(localStorage.getItem('zci_admin') || 'null');
let currentPage = 'dashboard';
let pageCache = {};

const navItems = [
  {id:'dashboard',label:'Dashboard',icon:'ti-layout-dashboard',group:'MAIN'},
  {id:'contacts',label:'Contacts & Leads',icon:'ti-mail',group:'MAIN',badge:'new',badgeColor:'orange'},
  {id:'services',label:'Services',icon:'ti-flask',group:'CONTENT'},
  {id:'projects',label:'Projects',icon:'ti-briefcase',group:'CONTENT'},
  {id:'testimonials',label:'Testimonials',icon:'ti-star',group:'CONTENT'},
  {id:'settings',label:'Website Settings',icon:'ti-settings',group:'SYSTEM'},
  {id:'upload',label:'Media Upload',icon:'ti-photo',group:'SYSTEM'},
  {id:'profile',label:'Admin Profile',icon:'ti-user',group:'SYSTEM'},
];

function buildNav(containerId) {
  const c = document.getElementById(containerId);
  if (!c) return;
  let lastGroup = '';
  let html = '';
  navItems.forEach(item => {
    if (item.group !== lastGroup) {
      html += `<div class="sb-group">${item.group}</div>`;
      lastGroup = item.group;
    }
    const badge = item.badge ? `<span class="sb-badge ${item.badgeColor||''}" id="badge_${item.id}"></span>` : '';
    html += `<div class="sb-item${currentPage===item.id?' active':''}" data-page="${item.id}" onclick="navigate('${item.id}');closeMobSidebar()">
      <i class="ti ${item.icon}" aria-hidden="true"></i>
      <span class="sb-label">${item.label}</span>${badge}
    </div>`;
  });
  c.innerHTML = html;
}

function toggleMobSidebar() {
  document.getElementById('mobSidebar').classList.toggle('open');
  document.getElementById('mobBackdrop').classList.toggle('show');
}
function closeMobSidebar() {
  document.getElementById('mobSidebar').classList.remove('open');
  document.getElementById('mobBackdrop').classList.remove('show');
}

function toast(msg, type='info') {
  const t = document.getElementById('toastRoot');
  const el = document.createElement('div');
  const bg = type==='success'?'var(--success-bg)':type==='error'?'var(--danger-bg)':'var(--blue-light)';
  const col = type==='success'?'var(--success)':type==='error'?'var(--danger)':'var(--blue)';
  el.style.cssText = `background:${bg};color:${col};border:1px solid;border-radius:8px;padding:10px 14px;font-size:13px;max-width:280px;box-shadow:0 2px 8px rgba(0,0,0,0.1)`;
  el.textContent = msg;
  t.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

async function api(method, path, body) {
  const opts = {
    method,
    headers: {'Content-Type':'application/json'},
  };
  if (authToken) opts.headers['Authorization'] = `Bearer ${authToken}`;
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(`${API}${path}`, opts);
    if (r.status === 401) { handleLogout(); return null; }
    return await r.json();
  } catch(e) {
    return {success:false, message:'Network error — check if backend is running'};
  }
}

function navigate(page) {
  currentPage = page;
  document.getElementById('topTitle').textContent = navItems.find(n=>n.id===page)?.label || 'Dashboard';
  buildNav('sbNav');
  buildNav('mobSbNav');
  const pages = {
    dashboard: renderDashboard,
    contacts: renderContacts,
    services: renderServices,
    projects: renderProjects,
    testimonials: renderTestimonials,
    settings: renderSettings,
    upload: renderUpload,
    profile: renderProfile,
  };
  const fn = pages[page];
  if (fn) fn();
  else renderDashboard();
}

function handleLogout() {
  localStorage.removeItem('zci_token');
  localStorage.removeItem('zci_admin');
  authToken = null; authAdmin = null;
  renderLogin();
}

async function renderContacts() {
  setLoading();
  const res = await api('GET','/contacts');
  const contacts = res?.data || [];
  if(!res?.success && contacts.length===0) {
    setContent(`<div class="err-box"><i class="ti ti-alert-circle" aria-hidden="true"></i>${res?.message||'Failed to load contacts'}</div>`);
    return;
  }
  const badge = document.getElementById('badge_contacts');
  const newCount = contacts.filter(c=>{
    const d = new Date(c.createdAt);
    const now = new Date();
    return (now-d)<86400000*7;
  }).length;
  if(badge) badge.textContent = newCount || '';

  let searchQ = '';
  function render(list) {
    const filtered = list.filter(c =>
      !searchQ || c.name.toLowerCase().includes(searchQ.toLowerCase()) ||
      c.email.toLowerCase().includes(searchQ.toLowerCase()) ||
      (c.serviceInterested||'').toLowerCase().includes(searchQ.toLowerCase())
    );
    document.getElementById('contactList').innerHTML = filtered.length===0
      ? `<div class="empty-state"><i class="ti ti-inbox" aria-hidden="true"></i>No contacts found</div>`
      : filtered.map(c=>`
      <div class="contact-item" onclick="openContactDetail('${c._id}')">
        <div class="contact-av">${(c.name||'?')[0].toUpperCase()}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <div style="font-size:14px;font-weight:600;color:var(--text)">${c.name}</div>
            ${c.company?`<span class="badge badge-gray" style="font-size:10px">${c.company}</span>`:''}
          </div>
          <div style="font-size:12px;color:var(--text3);margin-top:1px">${c.email} · ${c.phone}</div>
          ${c.serviceInterested?`<div style="margin-top:5px"><span class="badge badge-blue">${c.serviceInterested}</span></div>`:''}
          <div style="font-size:12px;color:var(--text3);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:400px">${c.message}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:11px;color:var(--text3)">${new Date(c.createdAt).toLocaleDateString('en-IN')}</div>
          <button class="btn btn-danger btn-sm btn-icon" style="margin-top:6px" onclick="event.stopPropagation();deleteContact('${c._id}')" aria-label="Delete contact"><i class="ti ti-trash" aria-hidden="true"></i></button>
        </div>
      </div>`).join('');
  }

  setContent(`
  <div class="ph">
    <div class="ph-title">Contacts & Leads</div>
    <div class="ph-sub">${contacts.length} total inquiries received</div>
  </div>
  <div class="toolbar">
    <input class="srch" type="search" placeholder="Search by name, email, service..." aria-label="Search contacts" id="contactSearch" value="${searchQ}">
    <span style="font-size:12px;color:var(--text3);margin-left:auto">${contacts.length} inquiries</span>
    <button class="btn btn-outline btn-sm" onclick="exportContactsCSV()" aria-label="Export CSV"><i class="ti ti-download" aria-hidden="true"></i> Export CSV</button>
  </div>
  <div id="contactList"></div>
  `);
  render(contacts);
  document.getElementById('contactSearch').addEventListener('input', e => { searchQ = e.target.value; render(contacts); });
  window._contacts = contacts;
}

window.exportContactsCSV = function() {
  const data = window._contacts || [];
  if (!data.length) { toast('No data to export','error'); return; }
  const headers = ['Name','Email','Phone','Company','Service Interested','Message','Date'];
  const rows = data.map(c => [
    c.name, c.email, c.phone, c.company||'', c.serviceInterested||'', `"${(c.message||'').replace(/"/g,'""')}"`,
    new Date(c.createdAt).toLocaleDateString('en-IN')
  ]);
  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `contacts_${Date.now()}.csv`;
  a.click();
  toast('CSV exported successfully','success');
};

window.deleteContact = async function(id) {

window.toggleSvcStatus = async function(id, btn) {
  const res = await api('PATCH',`/services/${id}/toggle-status`);
  if (res?.success) {
    const isActive = res.data.status === 'active';
    btn.classList.toggle('on', isActive);
    toast(`Service ${isActive?'activated':'deactivated'}`,'success');
  } else toast(res?.message||'Failed','error');
};

window.submitService = async function(id) {
  const errEl = document.getElementById('sf_err');
  errEl.innerHTML = '';
  const fileInput = document.getElementById('sf_imgFile');
  let imageData = null;

  if (fileInput?.files?.[0]) {
    const fd = new FormData();
    fd.append('image', fileInput.files[0]);
    try {
      const uploadRes = await fetch(`${API}/upload/single`, {
        method:'POST',
        headers:{'Authorization':`Bearer ${authToken}`},
        body: fd
      });
      const uploadJson = await uploadRes.json();
      if (uploadJson?.success) {
        imageData = { url: uploadJson.data.url, publicId: uploadJson.data.publicId, alt: document.getElementById('sf_title').value };
      } else {
        errEl.innerHTML = `<div class="err-box"><i class="ti ti-alert-circle" aria-hidden="true"></i>${uploadJson.message||'Image upload failed'}</div>`;
        return;
      }
    } catch(e) {
      errEl.innerHTML = `<div class="err-box"><i class="ti ti-alert-circle" aria-hidden="true"></i>Image upload failed</div>`;
      return;
    }
  }

  const features = document.getElementById('sf_features').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const applications = document.getElementById('sf_apps').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const keywords = document.getElementById('sf_keywords').value.split(',').map(s=>s.trim()).filter(Boolean);

  const payload = {
    title: document.getElementById('sf_title').value.trim(),
    slug: document.getElementById('sf_slug').value.trim(),
    shortDesc: document.getElementById('sf_shortDesc').value.trim(),
    description: document.getElementById('sf_desc').value.trim(),
    status: document.getElementById('sf_status').value,
    icon: document.getElementById('sf_icon').value.trim(),
    metaTitle: document.getElementById('sf_metaTitle').value.trim(),
    metaDesc: document.getElementById('sf_metaDesc').value.trim(),
    features, applications, keywords,
    featured: document.getElementById('sf_featured').classList.contains('on'),
    order: parseInt(document.getElementById('sf_order').value)||0,
  };
  if (imageData) payload.image = imageData;

  const res = await api(id?'PUT':'POST', id?`/services/${id}`:'/services', payload);
  if (res?.success) {
    toast(id?'Service updated':'Service created','success');
    closeModal(); renderServices();
  } else {
    errEl.innerHTML = `<div class="err-box"><i class="ti ti-alert-circle" aria-hidden="true"></i>${res?.message||'Failed'}</div>`;
  }
};

async function renderProjects() {
  setLoading();
  const res = await api('GET','/projects');
  const projects = res?.data || [];
  let searchQ='', filterFeat='';

  function render() {
    const filtered = projects.filter(p =>
      (!searchQ || p.title.toLowerCase().includes(searchQ.toLowerCase()) || p.client.toLowerCase().includes(searchQ.toLowerCase()) || p.location.toLowerCase().includes(searchQ.toLowerCase())) &&
      (filterFeat===''||(filterFeat==='true'?p.featured:!p.featured))
    );
    document.getElementById('projList').innerHTML = filtered.length===0
      ? `<div class="empty-state"><i class="ti ti-briefcase" aria-hidden="true"></i>No projects found</div>`
      : `<div class="proj-grid">${filtered.map(p=>`
        <div class="proj-card">
          <div class="proj-img">
            ${p.image?.url?`<img src="${p.image.url}" style="width:100%;height:100%;object-fit:cover" alt="${p.title}">`:`<i class="ti ti-briefcase" style="font-size:28px;color:var(--text3)" aria-hidden="true"></i>`}
            ${p.featured?`<span class="proj-badge">Featured</span>`:''}
          </div>
          <div class="proj-body">
            <div class="proj-title">${p.title}</div>
            <div class="proj-meta">${p.client} · ${p.location} · ${p.year}</div>
            <div class="proj-tags">
              <span class="badge badge-blue" style="font-size:10px">${p.category}</span>
              <span class="badge badge-${p.status==='active'?'active':'inactive'}" style="font-size:10px">${p.status}</span>
              ${(p.tags||[]).slice(0,2).map(t=>`<span class="badge badge-gray" style="font-size:10px">${t}</span>`).join('')}
            </div>
            <div style="display:flex;gap:5px">
              <button class="btn btn-outline btn-sm" style="flex:1;justify-content:center" onclick="openEditProject('${p._id}')"><i class="ti ti-edit" aria-hidden="true"></i> Edit</button>

  }

  setContent(`

    <div class="ph-sub">${projects.length} total projects</div>
  </div>
  <div class="toolbar">

  </div>
  <div id="projList"></div>
  `);

  document.getElementById('projSearch').addEventListener('input', e => { searchQ=e.target.value; render(); });

window.saveSlide = async function() {
  const errEl = document.getElementById('sl_err');
  let imageUrl = '';
  const fileInput = document.getElementById('sl_imgFile');
  if (fileInput?.files?.[0]) {
    const fd = new FormData();
    fd.append('image', fileInput.files[0]);
    try {
      const r = await fetch(`${API}/upload/single`,{method:'POST',headers:{'Authorization':`Bearer ${authToken}`},body:fd});
      const j = await r.json();
      if (j?.success) imageUrl = j.data.url;
      else { errEl.innerHTML=`<div class="err-box"><i class="ti ti-alert-circle" aria-hidden="true"></i>${j.message||'Upload failed'}</div>`; return; }
    } catch { errEl.innerHTML=`<div class="err-box"><i class="ti ti-alert-circle" aria-hidden="true"></i>Upload failed</div>`; return; }
  }
  const existing = window._settingsData?.heroSlides || [];
  const newSlide = {
    title: document.getElementById('sl_title').value.trim(),
    subtitle: document.getElementById('sl_subtitle').value.trim(),
    description: document.getElementById('sl_desc').value.trim(),
    buttonText: document.getElementById('sl_btntext').value.trim(),
    buttonLink: document.getElementById('sl_btnlink').value.trim(),
    order: parseInt(document.getElementById('sl_order').value)||0,
    isActive: document.getElementById('sl_active').classList.contains('on'),
    image: imageUrl,
  };
  const res = await api('PUT','/settings/hero-slides', {heroSlides:[...existing, newSlide]});
  if (res?.success) {
    window._settingsData.heroSlides = res.data;
    toast('Slide added','success'); closeModal();
    renderSettingsTab(4, window._settingsData);
  } else errEl.innerHTML=`<div class="err-box"><i class="ti ti-alert-circle" aria-hidden="true"></i>${res?.message||'Failed'}</div>`;
};

window.handleSingleUpload = async function(inp) {
  if (!inp.files?.[0]) return;
  const el = document.getElementById('upSingleResult');
  el.innerHTML = `<div class="inline-loading"><div class="spin"></div> Uploading...</div>`;
  const fd = new FormData();
  fd.append('image', inp.files[0]);
  try {
    const r = await fetch(`${API}/upload/single`,{method:'POST',headers:{'Authorization':`Bearer ${authToken}`},body:fd});
    const j = await r.json();
    if (j?.success) {
      el.innerHTML = `<div class="success-box">Uploaded successfully!</div>
      <div style="display:flex;gap:12px;align-items:center;margin-top:8px">
        <img src="${j.data.url}" style="width:80px;height:60px;object-fit:cover;border-radius:8px;border:1px solid var(--border)">
        <div>
          <div style="font-size:12px;color:var(--text2);margin-bottom:6px;word-break:break-all">${j.data.url}</div>
          <button class="btn btn-outline btn-sm" onclick="navigator.clipboard.writeText('${j.data.url}').then(()=>toast('URL copied!','success'))"><i class="ti ti-copy" aria-hidden="true"></i> Copy URL</button>
        </div>
      </div>`;
    } else el.innerHTML = `<div class="err-box"><i class="ti ti-alert-circle" aria-hidden="true"></i>${j.message||'Upload failed'}</div>`;
  } catch { el.innerHTML=`<div class="err-box"><i class="ti ti-alert-circle" aria-hidden="true"></i>Network error</div>`; }
  inp.value = '';
};

window.handleMultiUpload = async function(inp) {
  if (!inp.files?.length) return;
  const el = document.getElementById('upMultiResult');
  el.innerHTML = `<div class="inline-loading"><div class="spin"></div> Uploading ${inp.files.length} files...</div>`;
  const fd = new FormData();
  Array.from(inp.files).forEach(f => fd.append('images', f));
  try {
    const r = await fetch(`${API}/upload/multiple`,{method:'POST',headers:{'Authorization':`Bearer ${authToken}`},body:fd});

    <div class="card">
      <div class="card-hd"><i class="ti ti-lock" style="color:var(--orange)" aria-hidden="true"></i><div class="card-title">Change Password</div></div>
      <div class="card-body">
        <div class="form-group"><label class="form-label">Current Password</label><input class="form-input" id="pw_current" type="password" placeholder="Enter current password"></div>
        <div class="form-group"><label class="form-label">New Password (min 6 chars)</label><input class="form-input" id="pw_new" type="password" placeholder="New password"></div>
        <div class="form-group"><label class="form-label">Confirm New Password</label><input class="form-input" id="pw_confirm" type="password" placeholder="Confirm password"></div>
        <div id="pw_msg" style="margin-bottom:8px"></div>
        <button class="btn btn-orange" onclick="changePassword()"><i class="ti ti-lock" aria-hidden="true"></i> Update Password</button>
      </div>
    </div>
  </div>
  `);
}

window.saveProfile = async function(id) {
  const name = document.getElementById('prof_name').value.trim();
  const el = document.getElementById('prof_msg');
  if (!name) { el.innerHTML=`<div class="err-box"><i class="ti ti-alert-circle" aria-hidden="true"></i>Name is required</div>`; return; }
  toast('Profile update via API not yet exposed — update via DB directly', 'info');
};

window.changePassword = async function() {
  const cur = document.getElementById('pw_current').value;
  const nw = document.getElementById('pw_new').value;
  const conf = document.getElementById('pw_confirm').value;
  const el = document.getElementById('pw_msg');
  if (!cur||!nw||!conf) { el.innerHTML=`<div class="err-box"><i class="ti ti-alert-circle" aria-hidden="true"></i>All fields required</div>`; return; }
  if (nw!==conf) { el.innerHTML=`<div class="err-box"><i class="ti ti-alert-circle" aria-hidden="true"></i>Passwords don't match</div>`; return; }
  if (nw.length<6) { el.innerHTML=`<div class="err-box"><i class="ti ti-alert-circle" aria-hidden="true"></i>Min 6 characters</div>`; return; }
  const res = await api('PUT','/auth/change-password',{currentPassword:cur,newPassword:nw});
  if (res?.success) { el.innerHTML=`<div class="success-box">Password changed successfully!</div>`; document.getElementById('pw_current').value=''; document.getElementById('pw_new').value=''; document.getElementById('pw_confirm').value=''; }
  else el.innerHTML=`<div class="err-box"><i class="ti ti-alert-circle" aria-hidden="true"></i>${res?.message||'Failed'}</div>`;
};

function showModal(html) {
  const root = document.getElementById('modalRoot');
  root.innerHTML = `<div class="overlay"><div class="modal">${html}</div></div>`;
  root.querySelector('.overlay').addEventListener('click', e => { if(e.target===root.querySelector('.overlay')) closeModal(); });
  root.querySelectorAll('.toggle').forEach(t => t.addEventListener('click', () => t.classList.toggle('on')));
}
window.closeModal = function() { document.getElementById('modalRoot').innerHTML = ''; };

function renderLogin() {
  document.getElementById('shell').style.display = 'none';
  document.getElementById('modalRoot').innerHTML = `
  <div style="min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:16px">
    <div style="background:var(--white);border:1px solid var(--border);border-radius:14px;padding:32px;width:min(380px,100%);border-top:4px solid var(--blue)">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div class="sb-logo" style="width:40px;height:40px;font-size:14px">ZCI</div>
        <div>
          <div style="font-size:15px;font-weight:700;color:var(--text)">ZAS CHEM INDIA</div>
          <div style="font-size:12px;color:var(--orange);font-weight:600">Admin Panel</div>
        </div>
      </div>
      <div style="margin-bottom:24px">
        <div style="font-size:20px;font-weight:700;color:var(--text)">Sign In</div>
        <div style="font-size:13px;color:var(--text3)">Enter your admin credentials to continue</div>
      </div>
      <div class="form-group"><label class="form-label">Email Address</label><input class="form-input" id="login_email" type="email" placeholder="admin@zaschemindia.com" value="admin@zaschemindia.com"></div>
      <div class="form-group"><label class="form-label">Password</label><input class="form-input" id="login_pw" type="password" placeholder="Password" value="Admin@123456"></div>
      <div id="login_err" style="margin-bottom:10px"></div>
      <button class="btn btn-blue" style="width:100%;justify-content:center;padding:10px" onclick="doLogin()"><i class="ti ti-login" aria-hidden="true"></i> Sign In to Dashboard</button>
      <div style="margin-top:12px;font-size:12px;color:var(--text3);text-align:center">Secure admin access — ZAS CHEM INDIA PVT. LTD.</div>
    </div>
  </div>`;
}

window.doLogin = async function() {
  const email = document.getElementById('login_email').value.trim();
  const pw = document.getElementById('login_pw').value;
  const err = document.getElementById('login_err');
  err.innerHTML = '';
  if (!email||!pw) { err.innerHTML=`<div class="err-box"><i class="ti ti-alert-circle" aria-hidden="true"></i>Email and password required</div>`; return; }
  const res = await api('POST','/auth/login',{email,password:pw});
  if (res?.success) {
    authToken = res.data.token;
    authAdmin = res.data.admin;
    localStorage.setItem('zci_token', authToken);
    localStorage.setItem('zci_admin', JSON.stringify(authAdmin));
    document.getElementById('shell').style.display = 'flex';
    document.getElementById('modalRoot').innerHTML = '';
    if (authAdmin) {
      document.getElementById('sbName').textContent = authAdmin.name;
      document.getElementById('sbEmail').textContent = authAdmin.email;
      document.getElementById('sbAvatar').textContent = (authAdmin.name||'A')[0].toUpperCase();
    }
    buildNav('sbNav'); buildNav('mobSbNav');
    navigate('dashboard');
  } else {
    err.innerHTML=`<div class="err-box"><i class="ti ti-alert-circle" aria-hidden="true"></i>${res?.message||'Login failed'}</div>`;
  }
};

document.addEventListener('keydown', e => {
  if (e.key==='Enter' && document.getElementById('login_email')) doLogin();
  if (e.key==='Escape') closeModal();
});

buildNav('sbNav');
buildNav('mobSbNav');

if (!authToken) {
  renderLogin();
} else {
  navigate('dashboard');
}
</script>
